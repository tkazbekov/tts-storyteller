services:
  db:
    image: postgres:16
    container_name: tts_storyteller_db
    environment:
      POSTGRES_USER: tts_storyteller
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: tts_storyteller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tts_storyteller -d tts_storyteller"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
