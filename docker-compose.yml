services:
  db:
    image: postgres:16
    container_name: qwen3_tts_db
    environment:
      POSTGRES_USER: qwen_tts
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: qwen_tts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qwen_tts -d qwen_tts"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
